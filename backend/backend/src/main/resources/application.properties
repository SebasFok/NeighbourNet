spring.application.name=backend
# 1. Database Connection (Update 'yourpassword'!)
spring.datasource.url=jdbc:postgresql://localhost:5432/kampungkaki
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:default_password}

# 2. Hibernate Settings (This creates your tables automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Port Settings
server.port=8080